name: PEP8 Lint

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install flake8
      - name: Run flake8
        run: flake8 . --count --show-source --statistics 2>&1 | tee flake8_output.txt; exit ${PIPESTATUS[0]}
      - name: Comment PR with flake8 output
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('flake8_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### flake8 errors\n```\n' + output + '\n```'
            })name: PEP8 Lint

